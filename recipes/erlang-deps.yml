# Dependencies for building Erlang via mise
modules:
  - type: dnf
    install:
      packages:
        - autoconf
        - automake
        - erlang-odbc.x86_64
        - fop
        - java-25-openjdk-devel.x86_64
        - libiodbc
        - ncurses-devel
        - unixODBC-devel.x86_64
        - wxBase
        - wxGTK-devel
