# User-facing tools and applications
modules:
  - type: dnf
    repos:
      copr:
        - jdxcode/mise
        - scottames/ghostty
        - aleasto/waydroid
      files:
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
        - https://aaddrick.github.io/claude-desktop-debian/rpm/claude-desktop.repo
      keys:
        - https://brave-browser-rpm-release.s3.brave.com/brave-core.asc
        - https://aaddrick.github.io/claude-desktop-debian/KEY.gpg
    install:
      packages:
        - brave-browser
        - claude-desktop
        - ghostty
        - mise
        - waydroid
        # Docker Sandboxes (sbx) — installed directly from upstream RPM URL.
        # The `dnf` module accepts http(s) URLs under install.packages.
        # https://blue-build.org/reference/modules/dnf/
        - https://github.com/docker/sbx-releases/releases/latest/download/DockerSandboxes-linux-amd64-rockylinux8.rpm

  - type: bling
    install:
      - 1password
