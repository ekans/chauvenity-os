---
# hello world
name: chauvenity-os
description: Personal image

base-image: ghcr.io/ublue-os/bluefin-dx
# Digest-pin: BlueBuild has no first-class digest field. Relies on the CLI's
# lenient (unanchored) Tag parser accepting tag@digest. Renovate bumps the
# digest (see .github/renovate.json5). Re-verify on CLI upgrades.
# See docs/adr/0003-pin-base-digest-renovate.md.
image-version: stable@sha256:a81bde003edbf62014a2fdd1a6ad2811ad1350e74c56cc11dd7dbdeeccb589d7

modules:
  - type: chezmoi
    repository: "https://github.com/ekans/dotfiles"
    file-conflict-policy: replace

  - from-file: tools.yml
  - from-file: erlang-deps.yml
  - from-file: phoenix-deps.yml

  # Select the fr keymap for the LUKS unlock prompt via rd.vconsole.keymap=fr
  # (files/system/usr/lib/bootc/kargs.d). Upstream bluefin-dx again bakes
  # fr.map.gz into its initramfs, so the local dracut drop-in was removed.
  # See docs/adr/0002-fr-keymap-rd-vconsole-karg.md (supersedes 0001).
  - type: files
    files:
      - source: system
        destination: /

  - type: signing

  # Must remain last: regenerates the initramfs after all other modules have
  # dropped their files into the image.
  - type: initramfs
