---
name: chauvenity-os
description: Personal image

base-image: ghcr.io/ublue-os/bluefin-dx
image-version: stable

modules:
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
      - scope: user

  - type: soar
    auto-upgrade: true
    upgrade-interval: '3h'

  - type: chezmoi
    repository: "https://github.com/ekans/dotfiles"
    file-conflict-policy: replace

  - from-file: tools.yml
  - from-file: erlang-deps.yml
  - from-file: phoenix-deps.yml

  - type: signing
